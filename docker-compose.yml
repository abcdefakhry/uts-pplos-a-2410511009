version: '3.8'

services:
  # Database untuk Auth Service
  db_auth:
    image: mysql:8.0
    container_name: db_auth
    restart: always
    environment:
      MYSQL_DATABASE: db_auth
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - auth_data:/var/lib/mysql

  # Database untuk Kos Service (MySQL)
  db_kos:
    image: mysql:8.0
    container_name: db_kos
    restart: always
    environment:
      MYSQL_DATABASE: db_kos
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3307:3306" # Kita bedakan portnya agar tidak bentrok
    volumes:
      - kos_data:/var/lib/mysql

  # Database untuk Booking Service
  db_booking:
    image: mysql:8.0
    container_name: db_booking
    restart: always
    environment:
      MYSQL_DATABASE: db_booking
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - booking_data:/var/lib/mysql

volumes:
  auth_data:
  kos_data:
  booking_data:
